name: Publish 247420 to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, '[skip publish]') && !startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Sync version with npm registry
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          REMOTE=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          echo "remote=$REMOTE local=$LOCAL"
          HIGHER=$(node -e "const s=(a,b)=>a.split('.').map(Number).reduce((r,n,i)=>r||n-Number(b.split('.')[i]),0);process.stdout.write(s('$REMOTE','$LOCAL')>=0?'$REMOTE':'$LOCAL')")
          npm version "$HIGHER" --no-git-tag-version --allow-same-version
          npm version patch --no-git-tag-version

      - name: Build bundle
        run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Commit version bump and tag
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v$NEW_VERSION [skip publish]" || echo "nothing to commit"
          git tag "v$NEW_VERSION"
          git push origin HEAD:main
          git push origin "v$NEW_VERSION"
